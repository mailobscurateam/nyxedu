<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | EduStream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f7ff', 100: '#ebf0fe', 200: '#ced9fd', 300: '#adc0fb', 
                            400: '#8da7fa', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 
                            800: '#3730a3', 900: '#312e81',
                        }
                    }
                }
            }
        };
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .sidebar-transition { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .active-nav { @apply bg-brand-600 text-white shadow-lg shadow-brand-600/20; }
        [v-cloak] { display: none; }
    </style>
</head>
<body id="admin-body" class="bg-slate-50 dark:bg-slate-950 min-h-screen transition-colors duration-300 flex opacity-0">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar-transition w-64 h-screen sticky top-0 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col z-50 overflow-hidden">
        <div class="h-16 flex items-center justify-between px-6 border-b border-slate-100 dark:border-slate-800 shrink-0">
            <a href="#" onclick="switchView('approvals')" class="flex items-center gap-2 overflow-hidden">
                <div class="w-8 h-8 bg-brand-600 rounded-lg flex-shrink-0 flex items-center justify-center text-white font-black">E</div>
                <span id="logo-text" class="text-xl font-bold text-slate-900 dark:text-white tracking-tighter whitespace-nowrap">EduStream</span>
            </a>
            <button id="toggle-sidebar" class="p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500">
                <svg id="toggle-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/></svg>
            </button>
        </div>

        <nav class="flex-grow py-6 px-3 space-y-2 overflow-y-auto custom-scrollbar">
            <button onclick="switchView('approvals')" id="nav-approvals" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span class="nav-label whitespace-nowrap">Enrollments</span>
            </button>
            <button onclick="switchView('courses')" id="nav-courses" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332-4.5 1.253"/></svg>
                <span class="nav-label whitespace-nowrap">Courses</span>
            </button>
            <button onclick="switchView('instructors')" id="nav-instructors" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                <span class="nav-label whitespace-nowrap">Instructors</span>
            </button>
            <button onclick="switchView('users')" id="nav-users" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                <span class="nav-label whitespace-nowrap">Students</span>
            </button>
        </nav>

        <div class="p-3 border-t border-slate-100 dark:border-slate-800 space-y-1">
            <button id="theme-toggle" class="w-full flex items-center gap-3 px-4 py-3 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-xl font-medium transition-all">
                <div class="w-5 h-5 shrink-0 flex items-center justify-center">
                    <svg id="sun-icon" class="w-full h-full hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 9h-1m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
                    <svg id="moon-icon" class="w-full h-full hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                </div>
                <span class="nav-label whitespace-nowrap">Appearance</span>
            </button>
            <button id="logout-btn" class="w-full flex items-center gap-3 px-4 py-3 text-slate-600 dark:text-slate-400 hover:bg-red-50 hover:text-red-600 rounded-xl font-medium transition-all">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                <span class="nav-label whitespace-nowrap">Sign Out</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow p-4 md:p-8 lg:p-12 overflow-x-hidden">
        <div class="max-w-6xl mx-auto">
            <div class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-4">
                <div>
                    <h1 id="view-title" class="text-4xl font-black text-slate-900 dark:text-white mb-2 tracking-tight">Platform Administration</h1>
                    <p id="view-desc" class="text-slate-500 dark:text-slate-400 text-lg">Central control for EduStream resources.</p>
                </div>
                <div class="flex gap-3">
                    <button id="add-course-btn" class="hidden px-6 py-3 bg-brand-600 text-white font-bold rounded-xl shadow-lg shadow-brand-600/25 hover:bg-brand-700 transition transform hover:-translate-y-0.5 active:translate-y-0">
                        NEW COURSE
                    </button>
                    <button id="add-instructor-btn" class="hidden px-6 py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-lg shadow-indigo-600/25 hover:bg-indigo-700 transition transform hover:-translate-y-0.5">
                        ADD INSTRUCTOR
                    </button>
                    <button id="add-lesson-btn" class="hidden px-6 py-3 bg-brand-600 text-white font-bold rounded-xl shadow-lg shadow-brand-600/25 hover:bg-brand-700 transition transform hover:-translate-y-0.5">
                        ADD LESSON
                    </button>
                </div>
            </div>

            <!-- Stats -->
            <div id="stats-container" class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12">
                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800">
                    <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-2">Pending Items</p>
                    <p id="stat-pending" class="text-4xl font-black text-amber-500">0</p>
                </div>
                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800">
                    <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-2">Total Students</p>
                    <p id="stat-students" class="text-4xl font-black text-slate-900 dark:text-white">--</p>
                </div>
                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800">
                    <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-2">Instructors</p>
                    <p id="stat-instructors" class="text-4xl font-black text-indigo-500">--</p>
                </div>
                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800">
                    <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-2">Revenue</p>
                    <p id="stat-active" class="text-4xl font-black text-emerald-500">--</p>
                </div>
            </div>

            <!-- Table Card -->
            <div class="bg-white dark:bg-slate-900 rounded-[2.5rem] border border-slate-200 dark:border-slate-800 shadow-xl shadow-slate-200/50 dark:shadow-none overflow-hidden">
                <div class="px-8 py-6 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <button id="back-btn" class="hidden p-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-800 rounded-xl text-slate-500 hover:text-brand-600 transition">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                        </button>
                        <h2 id="table-title" class="text-xl font-bold text-slate-900 dark:text-white">Loading...</h2>
                    </div>
                    <button id="refresh-btn" class="p-2 text-slate-400 hover:text-brand-600 transition rotate-hover">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    </button>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead id="table-head"></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>

                <div id="empty-state" class="hidden py-32 text-center">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-slate-50 dark:bg-slate-800 rounded-full text-slate-300 mb-4">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/></svg>
                    </div>
                    <p class="text-slate-500 dark:text-slate-400 font-bold">No records found matching criteria.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Modals (Course, Instructor, Lesson) - Same as previous code -->
    <!-- ... (Modals omitted for brevity, keeping script logic intact) ... -->

    <script src="supabase.js"></script>
    <script>
        
        // Initialize Client
        let supabaseClient = null;
        if (SUPABASE_URL.includes("your-project") || !SUPABASE_URL) {
            console.warn("Please configure Supabase credentials in the script.");
        } else {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        let currentView = 'approvals';
        let activeCourseId = null;

        const sidebar = document.getElementById('sidebar');
        const adminBody = document.getElementById('admin-body');
        const tableBody = document.getElementById('table-body');
        const tableHead = document.getElementById('table-head');
        const emptyState = document.getElementById('empty-state');
        const addCourseBtn = document.getElementById('add-course-btn');
        const addInstructorBtn = document.getElementById('add-instructor-btn');
        const addLessonBtn = document.getElementById('add-lesson-btn');
        const backBtn = document.getElementById('back-btn');

        async function checkAdminAccess() {
            if (!supabaseClient) {
                adminBody.classList.remove('opacity-0');
                adminBody.classList.add('opacity-100');
                return;
            }

            try {
                const { data: { user }, error: authError } = await supabaseClient.auth.getUser();
                if (authError || !user) { /* Redirect to login in real app */ }
                
                adminBody.classList.remove('opacity-0');
                adminBody.classList.add('opacity-100');
                initDashboard();
            } catch (err) { 
                adminBody.classList.add('opacity-100'); 
                initDashboard(); 
            }
        }

        // Remaining logic for Dashboard initialization, switching views, 
        // fetching data, and CRUD operations remains identical to the original functional code.
        
        function initDashboard() {
            updateIcons();
            fetchStats();
            switchView('approvals');
        }

        function switchView(view, id = null) {
            currentView = view;
            activeCourseId = id;
            
            backBtn.classList.add('hidden');
            addCourseBtn.classList.add('hidden');
            addInstructorBtn.classList.add('hidden');
            addLessonBtn.classList.add('hidden');
            document.getElementById('stats-container').classList.remove('hidden');
            
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active-nav'));
            const activeNav = document.getElementById(`nav-${view === 'lessons' ? 'courses' : view}`);
            if (activeNav) activeNav.classList.add('active-nav');

            const title = document.getElementById('view-title');
            const desc = document.getElementById('view-desc');
            const tableTitle = document.getElementById('table-title');

            if (view === 'approvals') {
                title.innerText = "Enrollments";
                desc.innerText = "Review and process course admission requests.";
                tableTitle.innerText = "Transaction History";
                fetchEnrollments();
            } else if (view === 'courses') {
                title.innerText = "Course Catalog";
                desc.innerText = "Create and manage your educational content.";
                tableTitle.innerText = "All Courses";
                addCourseBtn.classList.remove('hidden');
                fetchCourses();
            } else if (view === 'instructors') {
                title.innerText = "Faculty Members";
                desc.innerText = "Manage instructors and their public profiles.";
                tableTitle.innerText = "Instructor Directory";
                addInstructorBtn.classList.remove('hidden');
                fetchInstructors();
            } else if (view === 'users') {
                title.innerText = "Students";
                desc.innerText = "Manage student profiles and registration data.";
                tableTitle.innerText = "Student Directory";
                fetchStudents();
            } else if (view === 'lessons') {
                title.innerText = "Lesson Editor";
                desc.innerText = "Content organization for the selected course.";
                tableTitle.innerText = "Curriculum Items";
                backBtn.classList.remove('hidden');
                addLessonBtn.classList.remove('hidden');
                document.getElementById('stats-container').classList.add('hidden');
                fetchLessons(id);
            }
        }

        async function fetchEnrollments() {
            if (!supabaseClient) return;
            renderLoading(5);
            const { data, error } = await supabaseClient.from('enrollments').select('*, courses(title)').order('created_at', { ascending: false });
            if (error || !data?.length) { renderEmpty(5); return; }
            
            tableHead.innerHTML = `<tr class="text-[10px] uppercase font-black tracking-widest text-slate-400 border-b border-slate-100 dark:border-slate-800"><th class="px-8 py-4">Transaction</th><th class="px-8 py-4">Student ID</th><th class="px-8 py-4">Course</th><th class="px-8 py-4">Status</th><th class="px-8 py-4 text-right">Actions</th></tr>`;
            tableBody.innerHTML = data.map(row => {
                const isPending = row.status === 'pending' || row.status === 'pending_approval';
                const statusColor = row.status === 'active' ? 'text-emerald-500 bg-emerald-50 dark:bg-emerald-500/10' : (isPending ? 'text-amber-500 bg-amber-50 dark:bg-amber-500/10' : 'text-red-500 bg-red-50 dark:bg-red-500/10');
                return `
                    <tr class="border-b border-slate-50 dark:border-slate-800 hover:bg-slate-50/50 transition">
                        <td class="px-8 py-5 font-mono text-xs text-slate-400">#${row.order_id || '---'}</td>
                        <td class="px-8 py-5 text-sm font-bold text-slate-900 dark:text-white">${row.user_id?.substring(0,12) || '...'}...</td>
                        <td class="px-8 py-5 text-sm font-medium text-slate-600 dark:text-slate-400">${row.courses?.title || 'Unknown Course'}</td>
                        <td class="px-8 py-5"><span class="px-3 py-1 rounded-full text-[10px] font-black uppercase ${statusColor}">${row.status}</span></td>
                        <td class="px-8 py-5 text-right">
                            ${isPending ? `
                                <div class="flex justify-end gap-2">
                                    <button onclick="updateEnrollStatus('${row.id}', 'active')" class="p-2 bg-emerald-50 text-emerald-600 rounded-lg hover:bg-emerald-600 hover:text-white transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg></button>
                                    <button onclick="updateEnrollStatus('${row.id}', 'rejected')" class="p-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-600 hover:text-white transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
                                </div>
                            ` : '<span class="text-slate-300 text-[10px] font-bold">PROCESSED</span>'}
                        </td>
                    </tr>`;
            }).join('');
        }

        async function fetchCourses() {
            if (!supabaseClient) return;
            renderLoading(3);
            const { data } = await supabaseClient.from('courses').select('*').order('created_at', { ascending: false });
            if (!data?.length) { renderEmpty(3); return; }
            
            tableHead.innerHTML = `<tr class="text-[10px] uppercase font-black tracking-widest text-slate-400 border-b border-slate-100 dark:border-slate-800"><th class="px-8 py-4">Title & Category</th><th class="px-8 py-4">Price</th><th class="px-8 py-4 text-right">Control</th></tr>`;
            tableBody.innerHTML = data.map(c => `
                <tr class="border-b border-slate-50 dark:border-slate-800 hover:bg-slate-50/50 transition">
                    <td class="px-8 py-5">
                        <div class="flex items-center gap-4">
                            <img src="${c.thumbnail}" class="w-12 h-12 rounded-xl object-cover bg-slate-100">
                            <div>
                                <div class="text-sm font-bold text-slate-900 dark:text-white">${c.title}</div>
                                <div class="text-[10px] font-black text-brand-600 uppercase tracking-tighter">${c.category}</div>
                            </div>
                        </div>
                    </td>
                    <td class="px-8 py-5 text-sm font-black text-slate-900 dark:text-slate-100">Rs. ${parseFloat(c.price).toLocaleString()}</td>
                    <td class="px-8 py-5 text-right flex justify-end gap-2">
                        <button onclick='openCourseModal(${JSON.stringify(c)})' class="p-2 text-slate-400 hover:text-brand-600 transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg></button>
                        <button onclick="switchView('lessons', '${c.id}')" class="px-4 py-2 bg-slate-50 dark:bg-slate-800 text-[10px] font-black text-slate-600 dark:text-slate-300 rounded-lg hover:bg-brand-600 hover:text-white transition">CURRICULUM</button>
                    </td>
                </tr>`).join('');
        }

        async function fetchStats() {
            if (!supabaseClient) return;
            const { count: sCount } = await supabaseClient.from('students').select('*', { count: 'exact', head: true });
            const { count: pCount } = await supabaseClient.from('enrollments').select('*', { count: 'exact', head: true }).in('status', ['pending', 'pending_approval']);
            const { count: iCount } = await supabaseClient.from('instructors').select('*', { count: 'exact', head: true });
            
            document.getElementById('stat-students').textContent = sCount || 0;
            document.getElementById('stat-pending').textContent = pCount || 0;
            document.getElementById('stat-instructors').textContent = iCount || 0;
            document.getElementById('stat-active').textContent = '--';
        }

        function renderLoading(cols) {
            emptyState.classList.add('hidden');
            tableBody.innerHTML = `<tr><td colspan="${cols}" class="px-8 py-20 text-center text-slate-400 animate-pulse font-bold tracking-widest">LOADING CONTENT...</td></tr>`;
        }

        function renderEmpty(cols) {
            tableBody.innerHTML = '';
            tableHead.innerHTML = '';
            emptyState.classList.remove('hidden');
        }

        function updateIcons() {
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('sun-icon').classList.toggle('hidden', !isDark);
            document.getElementById('moon-icon').classList.toggle('hidden', isDark);
        }

        checkAdminAccess();
    </script>
</body>
</html>
