<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | EduStream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 
                            400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 
                            800: '#075985', 900: '#0c4a6e',
                        }
                    }
                }
            }
        };
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .sidebar-transition { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .active-nav { @apply bg-brand-50 dark:bg-brand-900/20 text-brand-600 font-bold; }
        .modal-overlay { background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }
    </style>
</head>
<body id="admin-body" class="bg-slate-50 dark:bg-slate-950 min-h-screen transition-colors duration-300 flex opacity-0">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar-transition w-64 h-screen sticky top-0 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col z-50 overflow-hidden">
        <div class="h-16 flex items-center justify-between px-6 border-b border-slate-100 dark:border-slate-800 shrink-0">
            <a href="#" onclick="switchView('approvals')" class="flex items-center gap-2 overflow-hidden">
                <div class="w-8 h-8 bg-brand-600 rounded-lg flex-shrink-0 flex items-center justify-center text-white font-black">E</div>
                <span id="logo-text" class="text-xl font-bold text-slate-900 dark:text-white font-mono tracking-tighter whitespace-nowrap">EduStream</span>
            </a>
            <button id="toggle-sidebar" class="p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500">
                <svg id="toggle-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/></svg>
            </button>
        </div>

        <nav class="flex-grow py-6 px-3 space-y-1 overflow-y-auto custom-scrollbar">
            <button onclick="switchView('approvals')" id="nav-approvals" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all group active-nav">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span class="nav-label whitespace-nowrap">Enrollments</span>
            </button>
            <button onclick="switchView('courses')" id="nav-courses" class="w-full flex items-center gap-3 px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800/50 rounded-xl font-medium transition-all group">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                <span class="nav-label whitespace-nowrap">Courses</span>
            </button>
            <button onclick="switchView('users')" id="nav-users" class="w-full flex items-center gap-3 px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800/50 rounded-xl font-medium transition-all group">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                <span class="nav-label whitespace-nowrap">Users</span>
            </button>
        </nav>

        <div class="p-3 border-t border-slate-100 dark:border-slate-800 space-y-1">
            <button id="theme-toggle" class="w-full flex items-center gap-3 px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800/50 rounded-xl font-medium transition-all">
                <div class="w-5 h-5 shrink-0 flex items-center justify-center">
                    <svg id="sun-icon" class="w-full h-full hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 9h-1m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
                    <svg id="moon-icon" class="w-full h-full hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                </div>
                <span class="nav-label whitespace-nowrap">Appearance</span>
            </button>
            <button id="logout-btn" class="w-full flex items-center gap-3 px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:bg-red-50 hover:text-red-600 rounded-xl font-medium transition-all">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                <span class="nav-label whitespace-nowrap">Sign Out</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow p-4 md:p-8 lg:p-12 overflow-x-hidden">
        <div class="max-w-6xl mx-auto">
            <div class="mb-10 flex justify-between items-end">
                <div>
                    <h1 id="view-title" class="text-3xl font-black text-slate-900 dark:text-white mb-2 uppercase tracking-tight">Administration</h1>
                    <p id="view-desc" class="text-slate-500 dark:text-slate-400 italic">Central command for EduStream records.</p>
                </div>
            </div>

            <!-- Admin Stats -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-10">
                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
                    <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">Waitlist</p>
                    <p id="stat-pending" class="text-3xl font-black text-amber-500">0</p>
                </div>
                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
                    <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">Users</p>
                    <p id="stat-students" class="text-3xl font-black text-slate-900 dark:text-white">--</p>
                </div>
                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
                    <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">Courses</p>
                    <p id="stat-courses" class="text-3xl font-black text-slate-900 dark:text-white">--</p>
                </div>
                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
                    <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">Active Hub</p>
                    <p id="stat-active" class="text-3xl font-black text-brand-600">--</p>
                </div>
            </div>

            <!-- Content Area -->
            <div class="bg-white dark:bg-slate-900 rounded-[2rem] border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
                <div class="p-6 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between bg-slate-50/50 dark:bg-slate-800/50">
                    <h2 id="table-title" class="font-bold text-slate-900 dark:text-white flex items-center gap-2"></h2>
                    <button id="refresh-btn" class="text-xs font-bold text-brand-600 hover:text-brand-700 uppercase tracking-tighter">Refresh</button>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead id="table-head"></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>

                <div id="empty-state" class="hidden py-20 text-center">
                    <p class="text-slate-500 dark:text-slate-400 font-medium">No records found matching this view.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Pop-out -->
    <div id="modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 modal-overlay">
        <div class="bg-white dark:bg-slate-900 w-full max-w-lg rounded-[2rem] shadow-2xl overflow-hidden transform scale-95 transition-transform">
            <div class="p-8 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center">
                <h3 id="modal-title" class="text-xl font-bold dark:text-white">Edit Record</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">&times;</button>
            </div>
            <form id="modal-form" class="p-8 space-y-6">
                <div id="modal-fields" class="space-y-4"></div>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 py-4 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 font-bold rounded-2xl">Cancel</button>
                    <button type="submit" class="flex-1 py-4 bg-brand-600 text-white font-bold rounded-2xl shadow-lg">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 right-8 px-6 py-3 bg-slate-900 text-white text-sm font-bold rounded-2xl shadow-2xl opacity-0 transition-all pointer-events-none z-[110]"></div>

    <script>
        const CONFIG = {
            SUPABASE_URL: 'https://pkqpvnrtxtqlngwtfnhy.supabase.co',
            SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrcXB2bnJ0eHRxbG5nd3Rmbmh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzNzQxNTUsImV4cCI6MjA4NTk1MDE1NX0.wrYYlIzt1slOXkbUAqAaSI1bA9xJ2N8QhNHSRJIkZR0'
        };

        const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let currentView = 'approvals';
        let currentEditId = null;

        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('toggle-sidebar');
        const logoText = document.getElementById('logo-text');
        const navLabels = document.querySelectorAll('.nav-label');
        const tableBody = document.getElementById('table-body');
        const tableHead = document.getElementById('table-head');
        const emptyState = document.getElementById('empty-state');
        const refreshBtn = document.getElementById('refresh-btn');
        const adminBody = document.getElementById('admin-body');

        async function checkAdminAccess() {
            try {
                const { data: { user }, error: authError } = await supabaseClient.auth.getUser();
                if (authError || !user) { window.location.href = 'login.html'; return; }

                const { data: profile } = await supabaseClient.from('profiles').select('role').eq('id', user.id).single();

                if (!profile || profile.role !== 'admin') {
                    window.location.href = 'dashboard.html';
                    return;
                }

                adminBody.classList.remove('opacity-0');
                adminBody.classList.add('opacity-100');
                initDashboard();
            } catch (err) { window.location.href = 'login.html'; }
        }

        function initDashboard() {
            updateIcons();
            fetchStats();
            switchView('approvals');
            document.getElementById('modal-form').onsubmit = handleModalSubmit;
        }

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active-nav'));
            document.getElementById(`nav-${view}`)?.classList.add('active-nav');

            const title = document.getElementById('view-title');
            const desc = document.getElementById('view-desc');
            const tableTitle = document.getElementById('table-title');

            if (view === 'approvals') {
                title.innerText = "Enrollment Hub";
                desc.innerText = "Monitor and process student course access.";
                tableTitle.innerHTML = `<span class="w-2 h-2 bg-brand-500 rounded-full"></span> Incoming Requests`;
                fetchAllEnrollments();
            } else if (view === 'courses') {
                title.innerText = "Curriculum Lab";
                desc.innerText = "Modify pricing, titles, and course metadata.";
                tableTitle.innerHTML = `<span class="w-2 h-2 bg-brand-500 rounded-full"></span> Catalog Management`;
                fetchCourses();
            } else if (view === 'users') {
                title.innerText = "People Operations";
                desc.innerText = "Oversee student profiles and roles.";
                tableTitle.innerHTML = `<span class="w-2 h-2 bg-emerald-500 rounded-full"></span> User Directory`;
                fetchUsers();
            }
        }

        async function fetchAllEnrollments() {
            tableHead.innerHTML = `<tr class="text-[10px] uppercase tracking-widest text-slate-400 border-b border-slate-100 dark:border-slate-800"><th class="px-6 py-4">Ref</th><th class="px-6 py-4">Student</th><th class="px-6 py-4">Course</th><th class="px-6 py-4">Status</th><th class="px-6 py-4 text-right">Action</th></tr>`;
            tableBody.innerHTML = `<tr><td colspan="5" class="px-6 py-10 text-center animate-pulse">Querying Records...</td></tr>`;
            
            const { data, error } = await supabaseClient
                .from('enrollments')
                .select('*, courses(title), profiles(full_name, email)')
                .order('created_at', { ascending: false });

            if (error || !data?.length) { tableBody.innerHTML = ''; emptyState.classList.remove('hidden'); return; }
            emptyState.classList.add('hidden');
            
            tableBody.innerHTML = data.map(row => {
                const status = row.status?.toLowerCase();
                const studentName = row.profiles?.full_name || 'Anonymous';
                
                return `
                    <tr class="border-b border-slate-50 dark:border-slate-800 hover:bg-slate-50/50 transition">
                        <td class="px-6 py-4 font-mono text-[10px] text-slate-400 uppercase">#${row.order_id || '---'}</td>
                        <td class="px-6 py-4 text-sm font-bold text-slate-900 dark:text-white">${studentName}</td>
                        <td class="px-6 py-4 text-sm text-slate-600 dark:text-slate-300">${row.courses?.title || 'Unknown'}</td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-1 rounded-full text-[9px] font-black uppercase ${status === 'active' ? 'bg-emerald-50 text-emerald-600' : 'bg-amber-50 text-amber-600'}">
                                ${status}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            ${status === 'pending' ? `
                                <button onclick="updateStatus('${row.id}', 'active')" class="text-emerald-600 font-bold text-[10px] uppercase">Approve</button>
                            ` : `<span class="text-[9px] text-slate-300 uppercase italic">Closed</span>`}
                        </td>
                    </tr>`;
            }).join('');
        }

        async function fetchCourses() {
            tableHead.innerHTML = `<tr class="text-[10px] uppercase tracking-widest text-slate-400 border-b border-slate-100 dark:border-slate-800"><th class="px-6 py-4">Course</th><th class="px-6 py-4">Price</th><th class="px-6 py-4 text-right">Actions</th></tr>`;
            const { data } = await supabaseClient.from('courses').select('*').order('title');
            if (!data?.length) { tableBody.innerHTML = ''; emptyState.classList.remove('hidden'); return; }
            emptyState.classList.add('hidden');
            tableBody.innerHTML = data.map(course => `
                <tr class="border-b border-slate-50 dark:border-slate-800 hover:bg-slate-50/50 transition">
                    <td class="px-6 py-4 text-sm font-bold">${course.title}</td>
                    <td class="px-6 py-4 text-sm text-brand-600 font-black">Rs. ${course.price}</td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="openEditModal('courses', '${course.id}')" class="text-slate-400 hover:text-brand-600 font-bold text-[10px] uppercase tracking-wider">Configure</button>
                    </td>
                </tr>`).join('');
        }

        async function fetchUsers() {
            tableHead.innerHTML = `<tr class="text-[10px] uppercase tracking-widest text-slate-400 border-b border-slate-100 dark:border-slate-800"><th class="px-6 py-4">Identity</th><th class="px-6 py-4">Status</th><th class="px-6 py-4 text-right">Manage</th></tr>`;
            const { data } = await supabaseClient.from('profiles').select('*').order('full_name');
            if (!data?.length) { tableBody.innerHTML = ''; emptyState.classList.remove('hidden'); return; }
            emptyState.classList.add('hidden');
            tableBody.innerHTML = data.map(user => `
                <tr class="border-b border-slate-50 dark:border-slate-800 hover:bg-slate-50/50 transition">
                    <td class="px-6 py-4"><span class="text-sm font-bold">${user.full_name || 'Student'}</span><br><span class="text-[10px] text-slate-400">${user.email || 'No Email'}</span></td>
                    <td class="px-6 py-4"><span class="px-2 py-0.5 rounded text-[9px] font-black uppercase ${user.role==='admin'?'bg-red-50 text-red-600':'bg-slate-100'}">${user.role}</span></td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="openEditModal('profiles', '${user.id}')" class="text-slate-400 hover:text-brand-600 font-bold text-[10px] uppercase tracking-wider">Edit</button>
                    </td>
                </tr>`).join('');
        }

        // --- MODAL LOGIC ---
        async function openEditModal(table, id) {
            currentEditId = id;
            const { data, error } = await supabaseClient.from(table).select('*').eq('id', id).single();
            if (error) return;

            const fieldsDiv = document.getElementById('modal-fields');
            let content = '';

            if (table === 'courses') {
                content = `
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Course Title</label>
                    <input type="text" name="title" value="${data.title}" class="w-full p-4 bg-slate-50 dark:bg-slate-800 rounded-2xl outline-none focus:ring-2 ring-brand-500"></div>
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Price (LKR)</label>
                    <input type="number" name="price" value="${data.price}" class="w-full p-4 bg-slate-50 dark:bg-slate-800 rounded-2xl outline-none focus:ring-2 ring-brand-500"></div>
                `;
            } else {
                content = `
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Display Name</label>
                    <input type="text" name="full_name" value="${data.full_name || ''}" class="w-full p-4 bg-slate-50 dark:bg-slate-800 rounded-2xl outline-none focus:ring-2 ring-brand-500"></div>
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Role</label>
                    <select name="role" class="w-full p-4 bg-slate-50 dark:bg-slate-800 rounded-2xl outline-none focus:ring-2 ring-brand-500">
                        <option value="student" ${data.role === 'student' ? 'selected' : ''}>Student</option>
                        <option value="admin" ${data.role === 'admin' ? 'selected' : ''}>Admin</option>
                    </select></div>
                `;
            }

            fieldsDiv.innerHTML = content;
            document.getElementById('modal-title').innerText = `Configure ${table.slice(0,-1)}`;
            document.getElementById('modal').classList.remove('hidden');
        }

        async function handleModalSubmit(e) {
            e.preventDefault();
            const table = (currentView === 'courses') ? 'courses' : 'profiles';
            const formData = new FormData(e.target);
            const updateData = Object.fromEntries(formData.entries());

            const { error } = await supabaseClient.from(table).update(updateData).eq('id', currentEditId);
            if (!error) {
                showToast("Changes saved successfully");
                closeModal();
                switchView(currentView);
            } else {
                showToast("Save failed: " + error.message);
            }
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        async function updateStatus(id, status) {
            const { error } = await supabaseClient.from('enrollments').update({ status }).eq('id', id);
            if (!error) { showToast(`Record marked: ${status}`); fetchAllEnrollments(); fetchStats(); }
        }

        async function fetchStats() {
            const { count: sCount } = await supabaseClient.from('profiles').select('*', { count: 'exact', head: true });
            const { count: cCount } = await supabaseClient.from('courses').select('*', { count: 'exact', head: true });
            const { count: pCount } = await supabaseClient.from('enrollments').select('*', { count: 'exact', head: true }).eq('status', 'pending');
            const { count: aCount } = await supabaseClient.from('enrollments').select('*', { count: 'exact', head: true }).eq('status', 'active');
            document.getElementById('stat-students').textContent = sCount || 0;
            document.getElementById('stat-courses').textContent = cCount || 0;
            document.getElementById('stat-pending').textContent = pCount || 0;
            document.getElementById('stat-active').textContent = aCount || 0;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg; toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 3000);
        }

        // --- SIDEBAR ---
        let isCollapsed = false;
        toggleBtn.addEventListener('click', () => {
            isCollapsed = !isCollapsed;
            sidebar.classList.toggle('w-64', !isCollapsed); sidebar.classList.toggle('w-20', isCollapsed);
            logoText.classList.toggle('hidden', isCollapsed); navLabels.forEach(l => l.classList.toggle('hidden', isCollapsed));
            document.getElementById('toggle-icon').style.transform = isCollapsed ? 'rotate(180deg)' : 'rotate(0deg)';
        });

        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            updateIcons();
        });

        function updateIcons() {
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('sun-icon').classList.toggle('hidden', !isDark);
            document.getElementById('moon-icon').classList.toggle('hidden', isDark);
        }

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            window.location.href = 'login.html';
        });

        refreshBtn.addEventListener('click', () => switchView(currentView));
        checkAdminAccess();
    </script>
</body>
</html>
