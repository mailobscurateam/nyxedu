<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | EduStream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f7ff', 100: '#ebf0fe', 200: '#ced9fd', 300: '#adc0fb', 
                            400: '#8da7fa', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 
                            800: '#3730a3', 900: '#312e81',
                        }
                    }
                }
            }
        };
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .active-nav { @apply bg-brand-600 text-white shadow-lg shadow-brand-600/20; }
        .modal-bg { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
    </style>
</head>
<body id="admin-body" class="bg-slate-50 dark:bg-slate-950 min-h-screen transition-colors duration-300 flex opacity-0">

    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 h-screen sticky top-0 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col z-50 overflow-hidden shrink-0">
        <div class="h-16 flex items-center justify-between px-6 border-b border-slate-100 dark:border-slate-800 shrink-0">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-brand-600 rounded-lg flex items-center justify-center text-white font-black">E</div>
                <span class="text-xl font-bold text-slate-900 dark:text-white tracking-tighter">EduStream</span>
            </div>
        </div>

        <nav class="flex-grow py-6 px-3 space-y-2 overflow-y-auto custom-scrollbar">
            <button onclick="switchView('approvals')" id="nav-approvals" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="2"/></svg>
                <span>Enrollments</span>
            </button>
            <button onclick="switchView('courses')" id="nav-courses" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13" stroke-width="2"/></svg>
                <span>Courses</span>
            </button>
            <button onclick="switchView('instructors')" id="nav-instructors" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2"/></svg>
                <span>Instructors</span>
            </button>
            <button onclick="switchView('students')" id="nav-students" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" stroke-width="2"/></svg>
                <span>Students</span>
            </button>
        </nav>

        <div class="p-3 border-t border-slate-100 dark:border-slate-800">
            <button id="logout-btn" class="w-full flex items-center gap-3 px-4 py-3 text-slate-600 dark:text-slate-400 hover:bg-red-50 hover:text-red-600 rounded-xl font-medium transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7" stroke-width="2"/></svg>
                <span>Sign Out</span>
            </button>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-grow p-8 overflow-x-hidden">
        <div class="max-w-6xl mx-auto">
            <header class="mb-8 flex justify-between items-end">
                <div>
                    <h1 id="view-title" class="text-3xl font-black text-slate-900 dark:text-white uppercase tracking-tight">Management</h1>
                    <p id="view-desc" class="text-slate-500">Resource administration console.</p>
                </div>
                <button id="create-btn" onclick="openCreateModal()" class="px-6 py-3 bg-brand-600 text-white font-bold rounded-xl shadow-lg hover:bg-brand-700 transition">
                    + CREATE NEW
                </button>
            </header>

            <!-- Table Card -->
            <div class="bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-800 overflow-hidden shadow-sm">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead id="table-head" class="bg-slate-50 dark:bg-slate-800/50"></thead>
                        <tbody id="table-body" class="divide-y divide-slate-100 dark:divide-slate-800"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Generic Modal -->
    <div id="modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 modal-bg">
        <div class="bg-white dark:bg-slate-900 w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden">
            <div class="px-8 py-6 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center">
                <h3 id="modal-title" class="text-xl font-bold dark:text-white">Edit Record</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">&times;</button>
            </div>
            <form id="modal-form" class="p-8 space-y-4">
                <div id="form-fields" class="space-y-4"></div>
                <div class="pt-6 flex gap-3">
                    <button type="button" onclick="closeModal()" class="flex-1 px-6 py-3 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 font-bold rounded-xl">Cancel</button>
                    <button type="submit" class="flex-1 px-6 py-3 bg-brand-600 text-white font-bold rounded-xl shadow-lg">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const CONFIG = {
            SUPABASE_URL: 'https://acxndpvztflskdnkxekn.supabase.co',
            SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFjeG5kcHZ6dGZsc2tkbmt4ZWtuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5OTk1MDUsImV4cCI6MjA4NzU3NTUwNX0.VXg94z121tZGbN4TAm0MwclBaqf1MVWp5cJiIncosv0'
        };

        const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let currentView = 'approvals';
        let currentEditId = null;

        async function checkAdminAccess() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = 'login.html'; return; }

            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('role')
                .eq('id', session.user.id)
                .single();

            if (!profile || profile.role !== 'admin') {
                window.location.href = 'dashboard.html';
                return;
            }

            document.getElementById('admin-body').classList.replace('opacity-0', 'opacity-100');
            init();
        }

        function init() {
            switchView('approvals');
            document.getElementById('logout-btn').onclick = async () => {
                await supabaseClient.auth.signOut();
                window.location.href = 'login.html';
            };
            document.getElementById('modal-form').onsubmit = handleFormSubmit;
        }

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
            document.getElementById(`nav-${view}`).classList.add('active-nav');
            
            const createBtn = document.getElementById('create-btn');
            createBtn.style.display = (view === 'approvals') ? 'none' : 'block';

            if (view === 'approvals') {
                updateUI("Enrollment Requests", "Approve or reject student course access.");
                fetchEnrollments();
            } else if (view === 'courses') {
                updateUI("Course Catalog", "Manage curricula and pricing.");
                fetchCourses();
            } else if (view === 'instructors') {
                updateUI("Instructors", "Manage staff and profile details.");
                fetchProfiles('instructor');
            } else if (view === 'students') {
                updateUI("Student Database", "Manage student information and roles.");
                fetchProfiles('student');
            }
        }

        function updateUI(title, desc) {
            document.getElementById('view-title').innerText = title;
            document.getElementById('view-desc').innerText = desc;
        }

        // --- FETCHERS ---

        async function fetchEnrollments() {
            const { data } = await supabaseClient.from('enrollments').select('*, courses(title), profiles(full_name)').order('created_at', { ascending: false });
            renderTable(
                ['Student', 'Course', 'Status', 'Date'],
                data.map(row => [
                    row.profiles?.full_name || row.user_id,
                    row.courses?.title || 'Unknown',
                    `<span class="px-2 py-1 rounded text-[10px] font-bold uppercase ${row.status === 'active' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}">${row.status}</span>`,
                    new Date(row.created_at).toLocaleDateString()
                ]),
                data.map(row => ({ id: row.id, actions: ['Approve', 'Delete'] }))
            );
        }

        async function fetchCourses() {
            const { data } = await supabaseClient.from('courses').select('*').order('title');
            renderTable(
                ['Title', 'Price', 'Level', 'Status'],
                data.map(row => [row.title, `$${row.price}`, row.level, row.is_published ? 'Live' : 'Draft']),
                data.map(row => ({ id: row.id, actions: ['Edit', 'Delete'] }))
            );
        }

        async function fetchProfiles(role) {
            const { data } = await supabaseClient.from('profiles').select('*').eq('role', role);
            renderTable(
                ['Name', 'Email', 'Role'],
                data.map(row => [row.full_name || 'N/A', row.email || 'N/A', row.role]),
                data.map(row => ({ id: row.id, actions: ['Edit', 'Delete'] }))
            );
        }

        // --- RENDERER ---

        function renderTable(headers, rows, meta) {
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');
            
            head.innerHTML = `<tr>${headers.map(h => `<th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-widest">${h}</th>`).join('')}<th class="px-6 py-4 text-right">Actions</th></tr>`;
            
            body.innerHTML = rows.map((row, i) => `
                <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/30 transition">
                    ${row.map(cell => `<td class="px-6 py-4 text-sm font-medium text-slate-600 dark:text-slate-300">${cell}</td>`).join('')}
                    <td class="px-6 py-4 text-right space-x-2">
                        ${meta[i].actions.map(act => `
                            <button onclick="handleAction('${act}', '${meta[i].id}')" class="text-xs font-bold ${act === 'Delete' ? 'text-red-500' : 'text-brand-600'} hover:underline uppercase">${act}</button>
                        `).join('')}
                    </td>
                </tr>
            `).join('');
        }

        // --- ACTIONS ---

        async function handleAction(action, id) {
            if (action === 'Delete') {
                if (!confirm("Are you sure? This cannot be undone.")) return;
                const table = currentView === 'approvals' ? 'enrollments' : (currentView === 'courses' ? 'courses' : 'profiles');
                await supabaseClient.from(table).delete().eq('id', id);
                switchView(currentView);
            } else if (action === 'Approve') {
                await supabaseClient.from('enrollments').update({ status: 'active' }).eq('id', id);
                switchView(currentView);
            } else if (action === 'Edit') {
                openEditModal(id);
            }
        }

        async function openCreateModal() {
            currentEditId = null;
            document.getElementById('modal-title').innerText = `Create New ${currentView.slice(0, -1)}`;
            setupForm();
            document.getElementById('modal').classList.remove('hidden');
        }

        async function openEditModal(id) {
            currentEditId = id;
            document.getElementById('modal-title').innerText = `Edit ${currentView.slice(0, -1)}`;
            const table = currentView === 'courses' ? 'courses' : 'profiles';
            const { data } = await supabaseClient.from(table).select('*').eq('id', id).single();
            setupForm(data);
            document.getElementById('modal').classList.remove('hidden');
        }

        function setupForm(data = {}) {
            const container = document.getElementById('form-fields');
            let fields = '';

            if (currentView === 'courses') {
                fields = `
                    <input type="text" name="title" value="${data.title || ''}" placeholder="Course Title" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border-none rounded-xl" required>
                    <textarea name="description" placeholder="Description" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border-none rounded-xl">${data.description || ''}</textarea>
                    <input type="number" name="price" value="${data.price || 0}" placeholder="Price" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border-none rounded-xl">
                    <select name="level" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border-none rounded-xl">
                        <option value="Beginner" ${data.level === 'Beginner' ? 'selected' : ''}>Beginner</option>
                        <option value="Intermediate" ${data.level === 'Intermediate' ? 'selected' : ''}>Intermediate</option>
                        <option value="Advanced" ${data.level === 'Advanced' ? 'selected' : ''}>Advanced</option>
                    </select>
                `;
            } else {
                fields = `
                    <input type="text" name="full_name" value="${data.full_name || ''}" placeholder="Full Name" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border-none rounded-xl" required>
                    <input type="email" name="email" value="${data.email || ''}" placeholder="Email Address" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border-none rounded-xl" required>
                    <select name="role" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border-none rounded-xl">
                        <option value="student" ${data.role === 'student' ? 'selected' : ''}>Student</option>
                        <option value="instructor" ${data.role === 'instructor' ? 'selected' : ''}>Instructor</option>
                        <option value="admin" ${data.role === 'admin' ? 'selected' : ''}>Admin</option>
                    </select>
                `;
            }
            container.innerHTML = fields;
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const payload = Object.fromEntries(formData.entries());
            const table = currentView === 'courses' ? 'courses' : 'profiles';

            if (currentEditId) {
                await supabaseClient.from(table).update(payload).eq('id', currentEditId);
            } else {
                await supabaseClient.from(table).insert([payload]);
            }

            closeModal();
            switchView(currentView);
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        checkAdminAccess();
    </script>
</body>
</html>
