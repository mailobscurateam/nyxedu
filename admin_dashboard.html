<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | EduStream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 
                            400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 
                            800: '#075985', 900: '#0c4a6e',
                        }
                    }
                }
            }
        };
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .sidebar-transition { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .active-nav { @apply bg-brand-50 dark:bg-brand-900/20 text-brand-600 font-bold; }
        .modal-overlay { transition: opacity 0.2s ease-out; }
        .modal-content { transition: transform 0.3s ease-out, opacity 0.3s ease-out; }
    </style>
</head>
<body id="admin-body" class="bg-slate-50 dark:bg-slate-950 min-h-screen transition-colors duration-300 flex opacity-0">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar-transition w-64 h-screen sticky top-0 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col z-50 overflow-hidden">
        <div class="h-16 flex items-center justify-between px-6 border-b border-slate-100 dark:border-slate-800 shrink-0">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-brand-600 rounded-lg flex-shrink-0 flex items-center justify-center text-white font-black">E</div>
                <span id="logo-text" class="text-xl font-bold text-slate-900 dark:text-white font-mono tracking-tighter whitespace-nowrap">EduStream</span>
            </div>
            <button id="toggle-sidebar" class="p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500">
                <svg id="toggle-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/></svg>
            </button>
        </div>

        <nav class="flex-grow py-6 px-3 space-y-1 overflow-y-auto custom-scrollbar">
            <button onclick="switchView('approvals')" id="nav-approvals" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all group active-nav">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span class="nav-label">Enrollments</span>
            </button>
            <button onclick="switchView('courses')" id="nav-courses" class="w-full flex items-center gap-3 px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-50 rounded-xl transition-all group">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                <span class="nav-label">Courses</span>
            </button>
            <button onclick="switchView('users')" id="nav-users" class="w-full flex items-center gap-3 px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-50 rounded-xl transition-all group">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                <span class="nav-label">Students</span>
            </button>
        </nav>

        <div class="p-3 border-t border-slate-100 dark:border-slate-800 space-y-1">
            <button id="theme-toggle" class="w-full flex items-center gap-3 px-3 py-2.5 text-slate-600 dark:text-slate-400 rounded-xl">
                <svg id="sun-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 9h-1m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
                <svg id="moon-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                <span class="nav-label">Appearance</span>
            </button>
            <button id="logout-btn" class="w-full flex items-center gap-3 px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:text-red-600 rounded-xl">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                <span class="nav-label">Sign Out</span>
            </button>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-grow p-4 md:p-8 lg:p-12 overflow-x-hidden">
        <div class="max-w-6xl mx-auto">
            <div class="mb-10 flex flex-col md:flex-row justify-between gap-6">
                <div>
                    <h1 id="view-title" class="text-3xl font-black text-slate-900 dark:text-white">Admin Dashboard</h1>
                    <p id="view-desc" class="text-slate-500">Manage your EduStream platform.</p>
                </div>
                <div id="view-actions"></div>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">
                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800">
                    <p class="text-slate-500 text-[10px] font-bold uppercase">Total Students</p>
                    <p id="stat-students" class="text-3xl font-black">--</p>
                </div>
                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800">
                    <p class="text-slate-500 text-[10px] font-bold uppercase">Total Courses</p>
                    <p id="stat-courses" class="text-3xl font-black">--</p>
                </div>
                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800">
                    <p class="text-slate-500 text-[10px] font-bold uppercase">Active Enrollments</p>
                    <p id="stat-active" class="text-3xl font-black text-emerald-600">--</p>
                </div>
            </div>

            <!-- Table Card -->
            <div class="bg-white dark:bg-slate-900 rounded-[2rem] border border-slate-200 dark:border-slate-800 overflow-hidden shadow-sm">
                <div class="p-6 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
                    <h2 id="table-title" class="font-bold">Database View</h2>
                    <button id="refresh-btn" class="text-xs font-black text-brand-600 uppercase">Refresh</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead id="table-head"></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
                <div id="empty-state" class="hidden py-20 text-center text-slate-400">No records found.</div>
            </div>
        </div>
    </main>

    <!-- Modal for Course Editing -->
    <div id="course-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
        <div class="modal-overlay absolute inset-0 bg-slate-950/60 backdrop-blur-sm" onclick="closeCourseModal()"></div>
        <div class="modal-content relative bg-white dark:bg-slate-900 w-full max-w-5xl max-h-[95vh] rounded-[2rem] flex flex-col overflow-hidden opacity-0 scale-95 transition-all">
            <div class="p-6 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center">
                <h3 id="modal-heading" class="text-xl font-black">Manage Course</h3>
                <button onclick="closeCourseModal()" class="text-slate-400 hover:text-slate-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="flex-grow overflow-y-auto p-6 custom-scrollbar">
                <form id="course-form" class="space-y-6">
                    <input type="hidden" id="edit-course-id">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="text-[10px] font-black uppercase text-slate-400">Title</label>
                            <input type="text" id="course-title" required class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-800 dark:bg-slate-950 focus:ring-2 ring-brand-500 outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] font-black uppercase text-slate-400">Price (Rs.)</label>
                            <input type="number" id="course-price" required class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-800 dark:bg-slate-950 focus:ring-2 ring-brand-500 outline-none">
                        </div>
                        <div class="md:col-span-2">
                            <label class="text-[10px] font-black uppercase text-slate-400">Thumbnail URL</label>
                            <input type="url" id="course-thumbnail" required class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-800 dark:bg-slate-950 focus:ring-2 ring-brand-500 outline-none">
                        </div>
                    </div>
                    <div class="pt-6 border-t border-slate-100 dark:border-slate-800">
                        <div class="flex justify-between items-center mb-4">
                            <h4 class="text-sm font-black uppercase tracking-widest">Lessons Content</h4>
                            <button type="button" onclick="addLessonRow()" class="px-4 py-2 bg-brand-600 text-white text-[10px] font-black rounded-xl">ADD NEW LESSON</button>
                        </div>
                        <div id="lessons-container" class="space-y-4"></div>
                    </div>
                </form>
            </div>
            <div class="p-6 border-t border-slate-100 dark:border-slate-800 flex justify-end gap-3">
                <button onclick="closeCourseModal()" class="px-6 py-2 text-sm font-bold text-slate-500">Cancel</button>
                <button type="submit" form="course-form" id="save-course-btn" class="px-8 py-2 bg-brand-600 text-white text-sm font-black rounded-xl shadow-lg">Save Course & Lessons</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 right-8 px-6 py-3 bg-slate-900 text-white text-sm font-bold rounded-2xl shadow-2xl opacity-0 transition-all z-[101]"></div>

    <script src="supabase.js"></script>
    <script>
        const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let currentView = 'approvals';
        let currentAdminId = null;

        const tableBody = document.getElementById('table-body');
        const tableHead = document.getElementById('table-head');
        const emptyState = document.getElementById('empty-state');
        const adminBody = document.getElementById('admin-body');
        const viewActions = document.getElementById('view-actions');

        async function checkAdminAccess() {
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (!user) { window.location.href = 'login.html'; return; }
                currentAdminId = user.id;
                
                const { data: profile } = await supabaseClient.from('profiles').select('role').eq('id', user.id).single();
                if (!profile || profile.role !== 'admin') { window.location.href = 'dashboard.html'; return; }
                
                adminBody.classList.remove('opacity-0');
                adminBody.classList.add('opacity-100');
                initDashboard();
            } catch (err) { window.location.href = 'login.html'; }
        }

        function initDashboard() {
            updateIcons();
            fetchStats();
            switchView('approvals');
        }

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active-nav'));
            document.getElementById(`nav-${view}`)?.classList.add('active-nav');
            
            const title = document.getElementById('view-title');
            const desc = document.getElementById('view-desc');
            viewActions.innerHTML = '';

            if (view === 'approvals') {
                title.innerText = "Enrollments";
                desc.innerText = "Approve or reject course enrollment requests.";
                fetchEnrollments();
            } else if (view === 'courses') {
                title.innerText = "Course Management";
                desc.innerText = "Add, edit or remove courses and lessons.";
                viewActions.innerHTML = `<button onclick="openCourseModal()" class="px-5 py-2.5 bg-brand-600 text-white text-xs font-black rounded-xl shadow-lg">NEW COURSE</button>`;
                fetchCourses();
            } else if (view === 'users') {
                title.innerText = "Students";
                desc.innerText = "Directory of all registered students.";
                fetchStudents();
            }
        }

        // --- ENROLLMENTS ---
        async function fetchEnrollments() {
            tableHead.innerHTML = `<tr class="text-[10px] uppercase text-slate-400 border-b dark:border-slate-800"><th class="px-6 py-4">Student ID</th><th class="px-6 py-4">Course</th><th class="px-6 py-4">Status</th><th class="px-6 py-4 text-right">Action</th></tr>`;
            tableBody.innerHTML = `<tr><td colspan="4" class="py-10 text-center animate-pulse">Loading...</td></tr>`;
            
            const { data } = await supabaseClient.from('enrollments').select('*, courses(title)').order('created_at', { ascending: false });
            if (!data?.length) { tableBody.innerHTML = ''; emptyState.classList.remove('hidden'); return; }
            emptyState.classList.add('hidden');

            tableBody.innerHTML = data.map(row => {
                const isPending = row.status === 'pending' || row.status === 'pending_approval';
                return `
                <tr class="border-b dark:border-slate-800 hover:bg-slate-50/50">
                    <td class="px-6 py-4 text-xs font-mono text-slate-400">${row.user_id.substring(0,10)}...</td>
                    <td class="px-6 py-4 text-sm font-bold">${row.courses?.title || 'Unknown'}</td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 rounded-full text-[9px] font-black uppercase ${row.status === 'active' ? 'bg-emerald-50 text-emerald-600' : 'bg-amber-50 text-amber-600'}">${row.status}</span>
                    </td>
                    <td class="px-6 py-4 text-right">
                        ${isPending ? `
                            <div class="flex justify-end gap-2">
                                <button onclick="updateEnrollmentStatus('${row.id}', 'active')" class="p-1.5 bg-emerald-50 text-emerald-600 rounded-lg"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg></button>
                                <button onclick="updateEnrollmentStatus('${row.id}', 'rejected')" class="p-1.5 bg-red-50 text-red-600 rounded-lg"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
                            </div>
                        ` : '<span class="text-[10px] text-slate-300 font-bold italic uppercase">Settled</span>'}
                    </td>
                </tr>`;
            }).join('');
        }

        async function updateEnrollmentStatus(id, status) {
            const { error } = await supabaseClient.from('enrollments').update({ status }).eq('id', id);
            if (!error) { showToast(`Enrollment ${status}`); fetchEnrollments(); fetchStats(); }
        }

        // --- COURSES & LESSONS ---
        async function fetchCourses() {
            tableHead.innerHTML = `<tr class="text-[10px] uppercase text-slate-400 border-b dark:border-slate-800"><th class="px-6 py-4">Course</th><th class="px-6 py-4">Price</th><th class="px-6 py-4 text-right">Actions</th></tr>`;
            const { data } = await supabaseClient.from('courses').select('*').order('created_at', { ascending: false });
            if (!data?.length) { tableBody.innerHTML = ''; emptyState.classList.remove('hidden'); return; }
            emptyState.classList.add('hidden');

            tableBody.innerHTML = data.map(c => `
                <tr class="border-b dark:border-slate-800">
                    <td class="px-6 py-4 text-sm font-bold">${c.title}</td>
                    <td class="px-6 py-4 text-sm">Rs. ${c.price}</td>
                    <td class="px-6 py-4 text-right">
                        <div class="flex justify-end gap-2">
                            <button onclick="openCourseModal('${c.id}')" class="text-brand-600 text-xs font-black hover:bg-brand-50 p-2 rounded-lg">EDIT</button>
                            <button onclick="deleteCourse('${c.id}')" class="text-red-600 text-xs font-black hover:bg-red-50 p-2 rounded-lg">DELETE</button>
                        </div>
                    </td>
                </tr>`).join('');
        }

        async function openCourseModal(courseId = null) {
            const modal = document.getElementById('course-modal');
            const container = document.getElementById('lessons-container');
            document.getElementById('course-form').reset();
            container.innerHTML = '';
            document.getElementById('edit-course-id').value = courseId || '';
            document.getElementById('modal-heading').innerText = courseId ? 'Edit Course Catalog' : 'Create New Course';

            if (courseId) {
                const { data: course } = await supabaseClient.from('courses').select('*').eq('id', courseId).single();
                const { data: lessons } = await supabaseClient.from('lessons').select('*').eq('course_id', courseId).order('order_index', { ascending: true });
                if (course) {
                    document.getElementById('course-title').value = course.title;
                    document.getElementById('course-price').value = course.price;
                    document.getElementById('course-thumbnail').value = course.thumbnail;
                }
                lessons?.forEach(l => addLessonRow(l));
            } else { addLessonRow(); }

            modal.classList.remove('hidden'); modal.classList.add('flex');
            setTimeout(() => modal.querySelector('.modal-content').classList.remove('opacity-0', 'scale-95'), 10);
        }

        function closeCourseModal() {
            const modal = document.getElementById('course-modal');
            modal.querySelector('.modal-content').classList.add('opacity-0', 'scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function addLessonRow(lesson = null) {
            const container = document.getElementById('lessons-container');
            const id = 'l-' + Math.random().toString(36).substr(2, 9);
            const div = document.createElement('div');
            div.className = "p-4 bg-slate-50 dark:bg-slate-950 rounded-2xl border border-slate-100 dark:border-slate-800 relative group";
            div.id = id;
            
            // Note: Instructor (UUID) defaults to current admin if empty
            const instructorValue = lesson?.instructor || currentAdminId || '';

            div.innerHTML = `
                <input type="hidden" class="lesson-id" value="${lesson?.id || ''}">
                <button type="button" onclick="removeLessonRow('${id}', '${lesson?.id || ''}')" class="absolute top-4 right-4 text-slate-400 hover:text-red-500 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                </button>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[9px] font-black uppercase text-slate-400">Lesson Title</label>
                        <input type="text" class="lesson-title w-full px-3 py-2 text-sm rounded-lg border dark:bg-slate-900 outline-none focus:border-brand-500" placeholder="e.g. Introduction to Physics" value="${lesson?.title || ''}">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black uppercase text-slate-400">Duration (e.g. 15 mins)</label>
                        <input type="text" class="lesson-duration w-full px-3 py-2 text-sm rounded-lg border dark:bg-slate-900 outline-none focus:border-brand-500" placeholder="10:00" value="${lesson?.duration || ''}">
                    </div>
                    <div class="space-y-1 md:col-span-2">
                        <label class="text-[9px] font-black uppercase text-slate-400">Description</label>
                        <textarea class="lesson-desc w-full px-3 py-2 text-sm rounded-lg border dark:bg-slate-900 outline-none focus:border-brand-500 min-h-[60px]" placeholder="Brief summary of the lesson...">${lesson?.description || ''}</textarea>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black uppercase text-slate-400">Video URL</label>
                        <input type="text" class="lesson-video w-full px-3 py-2 text-sm rounded-lg border dark:bg-slate-900 outline-none focus:border-brand-500" placeholder="https://youtube.com/..." value="${lesson?.video_url || ''}">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black uppercase text-slate-400">Instructor UUID</label>
                        <input type="text" class="lesson-instructor w-full px-3 py-2 text-sm font-mono rounded-lg border dark:bg-slate-900 outline-none focus:border-brand-500" placeholder="UUID" value="${instructorValue}">
                    </div>
                </div>
            `;
            container.appendChild(div);
        }

        async function removeLessonRow(rowId, lessonId) {
            if (lessonId && confirm("Permanently delete lesson from database?")) {
                await supabaseClient.from('lessons').delete().eq('id', lessonId);
            }
            document.getElementById(rowId).remove();
        }

        document.getElementById('course-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const courseId = document.getElementById('edit-course-id').value;
            const btn = document.getElementById('save-course-btn');
            btn.disabled = true; btn.innerText = "Processing...";

            const coursePayload = {
                title: document.getElementById('course-title').value,
                price: parseFloat(document.getElementById('course-price').value),
                thumbnail: document.getElementById('course-thumbnail').value
            };

            try {
                let currentId = courseId;
                if (courseId) { 
                    await supabaseClient.from('courses').update(coursePayload).eq('id', courseId); 
                } else { 
                    const { data, error: insErr } = await supabaseClient.from('courses').insert([coursePayload]).select().single();
                    if (insErr) throw insErr;
                    currentId = data.id; 
                }

                const lessonRows = document.querySelectorAll('#lessons-container > div');
                const lessons = Array.from(lessonRows).map((row, i) => {
                    const lId = row.querySelector('.lesson-id').value;
                    const inst = row.querySelector('.lesson-instructor').value || currentAdminId;
                    
                    return {
                        ...(lId ? { id: lId } : {}),
                        course_id: currentId,
                        title: row.querySelector('.lesson-title').value,
                        description: row.querySelector('.lesson-desc').value,
                        duration: row.querySelector('.lesson-duration').value,
                        video_url: row.querySelector('.lesson-video').value,
                        instructor: inst,
                        order_index: i
                    };
                }).filter(l => l.title.trim());

                if (lessons.length) {
                    const { error: upsertErr } = await supabaseClient.from('lessons').upsert(lessons);
                    if (upsertErr) throw upsertErr;
                }
                
                showToast("Course and lessons updated successfully!"); 
                closeCourseModal(); 
                fetchCourses(); 
                fetchStats();
            } catch (err) { 
                showToast("Error: " + err.message); 
                console.error(err);
            } finally { 
                btn.disabled = false; 
                btn.innerText = "Save Course & Lessons"; 
            }
        });

        async function deleteCourse(id) {
            if (confirm("Delete this course and all associated lessons?")) {
                await supabaseClient.from('courses').delete().eq('id', id);
                fetchCourses(); fetchStats();
            }
        }

        // --- STUDENTS ---
        async function fetchStudents() {
            tableHead.innerHTML = `<tr class="text-[10px] uppercase text-slate-400 border-b dark:border-slate-800"><th class="px-6 py-4">Name</th><th class="px-6 py-4">Email</th><th class="px-6 py-4">Registered</th></tr>`;
            const { data } = await supabaseClient.from('students').select('*').order('created_at', { ascending: false });
            if (!data?.length) { tableBody.innerHTML = ''; emptyState.classList.remove('hidden'); return; }
            emptyState.classList.add('hidden');
            tableBody.innerHTML = data.map(s => `
                <tr class="border-b dark:border-slate-800">
                    <td class="px-6 py-4 text-sm font-bold text-slate-900 dark:text-white">${s.full_name}</td>
                    <td class="px-6 py-4 text-sm text-slate-500">${s.email}</td>
                    <td class="px-6 py-4 text-xs text-slate-400">${new Date(s.created_at).toLocaleDateString()}</td>
                </tr>`).join('');
        }

        // --- UI UTILS ---
        async function fetchStats() {
            const { count: s } = await supabaseClient.from('students').select('*', { count: 'exact', head: true });
            const { count: c } = await supabaseClient.from('courses').select('*', { count: 'exact', head: true });
            const { count: a } = await supabaseClient.from('enrollments').select('*', { count: 'exact', head: true }).eq('status', 'active');
            document.getElementById('stat-students').innerText = s || 0;
            document.getElementById('stat-courses').innerText = c || 0;
            document.getElementById('stat-active').innerText = a || 0;
        }

        function showToast(msg) {
            const t = document.getElementById('toast'); t.innerText = msg; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 3000);
        }

        function updateIcons() {
            const d = document.documentElement.classList.contains('dark');
            document.getElementById('sun-icon').classList.toggle('hidden', !d);
            document.getElementById('moon-icon').classList.toggle('hidden', d);
        }

        document.getElementById('theme-toggle').addEventListener('click', () => { document.documentElement.classList.toggle('dark'); updateIcons(); });
        document.getElementById('refresh-btn').addEventListener('click', () => switchView(currentView));
        document.getElementById('logout-btn').addEventListener('click', async () => { await supabaseClient.auth.signOut(); window.location.href = 'login.html'; });

        checkAdminAccess();
    </script>
</body>
</html>
